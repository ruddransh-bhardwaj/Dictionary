<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligent Dictionary Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(135deg,#141E30,#243B55);
    color:white;
}

.container{
    width:95%;
    max-width:700px;
    padding:35px;
    border-radius:20px;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 12px 35px rgba(0,0,0,.4);
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#8ab4ff;
    font-size:2rem;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:16px;
    border:none;
    outline:none;
    border-radius:12px;
    font-size:1rem;
    background:#1f2937;
    color:white;
    transition:.3s;
}

input:focus{
    box-shadow:0 0 12px #8ab4ff;
}

button{
    padding:15px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#8b5cf6;
    color:white;
    font-size:1rem;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    background:#7c3aed;
}

.results{
    margin-top:25px;
    background:rgba(255,255,255,.06);
    border-radius:15px;
    padding:20px;
    min-height:130px;
    animation:fadeIn .4s ease;
}

.word{
    font-size:2rem;
    color:#22d3ee;
    margin-bottom:10px;
}

.phonetic{
    color:#9ca3af;
    margin-bottom:15px;
}

.meaning{
    line-height:1.7;
    color:#f3f4f6;
}

.part{
    color:#fbbf24;
    margin-top:15px;
}

audio{
    margin-top:15px;
    width:100%;
}

.loading{
    text-align:center;
    color:#8ab4ff;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:.4}
    50%{opacity:1}
    100%{opacity:.4}
}

.history{
    margin-top:20px;
}

.history span{
    display:inline-block;
    background:#374151;
    padding:8px 12px;
    border-radius:20px;
    margin:5px;
    cursor:pointer;
    transition:.3s;
}

.history span:hover{
    background:#4b5563;
}
</style>
</head>

<body>

<div class="container">

<h1>📖 Intelligent Dictionary Pro</h1>

<div class="search-box">
    <input
        type="text"
        id="wordInput"
        placeholder="Search any English word..."
        onkeypress="handleEnter(event)">
    <button onclick="searchWord()">Search</button>
</div>

<div class="results" id="result">
    Type a word to begin...
</div>

<div class="history">
    <h3>Recent Searches</h3>
    <div id="history"></div>
</div>

</div>

<script>

const result=document.getElementById("result");
const historyBox=document.getElementById("history");

let history=[];

function handleEnter(e){
    if(e.key==="Enter"){
        searchWord();
    }
}

async function searchWord(customWord){

    const input=document.getElementById("wordInput");
    const word=(customWord || input.value).trim();

    if(!word){
        return;
    }

    result.innerHTML=
    `<div class="loading">Searching...</div>`;

    try{

        const res=
        await fetch(
        `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);

        if(!res.ok){
            throw new Error();
        }

        const data=await res.json();
        const entry=data[0];

        const wordName=entry.word;
        const phonetic=
        entry.phonetic || "No phonetic";

        const meaning=
        entry.meanings[0];

        const part=
        meaning.partOfSpeech;

        const definition=
        meaning.definitions[0].definition;

        const example=
        meaning.definitions[0].example ||
        "No example available";

        let audio="";

        if(entry.phonetics){
            for(let p of entry.phonetics){
                if(p.audio){
                    audio=p.audio;
                    break;
                }
            }
        }

        result.innerHTML=
        `
        <div class="word">${wordName}</div>
        <div class="phonetic">${phonetic}</div>

        <div class="part">
        ${part}
        </div>

        <div class="meaning">
        ${definition}
        </div>

        <br>

        <b>Example:</b>
        ${example}

        ${
        audio ?
        `<audio controls src="${audio}"></audio>`
        :
        ""
        }
        `;

        addHistory(wordName);

    }
    catch{

        result.innerHTML=
        `
        <div style="color:#f87171">
        Word not found or API unavailable.
        </div>
        `;
    }
}

function addHistory(word){

    if(history.includes(word))
    return;

    history.unshift(word);

    if(history.length>6){
        history.pop();
    }

    renderHistory();
}

function renderHistory(){

    historyBox.innerHTML=
    history.map(word=>
    `<span onclick="searchWord('${word}')">${word}</span>`
    ).join("");
}

</script>

</body>
</html>
